<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Entrar na Conta</title>
    <link rel="stylesheet" href="/02-07/frontend/styles/loginho.css">
</head>
<body>
    <div class="login-container">
        <h2>Bienvenidos, ya se puenden ir</h2>
        <p>Si quiores colocas tus datos bancarios</p>
        
        <form>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>
            
            <div class="input-group">
                <label for="password">Senha</label>
                <input type="password" id="password" placeholder="Sua senha" required>
            </div>
            
            <div class="actions">
                
                <a href="#" class="forgot-password">Esqueceu a senha?</a>
            </div>
            
            <button type="submit" class="btn-login">No me toques</button>

        </form>
        
        <div class="register-link">
            No tienes dineros, pobre? <a href="/02-07/frontend/pages/TelaDeCadatro.html">vamos a la esquina</a>
        </div>
    </div>

    <script src="/02-07/frontend/assets/JS/loginho.js"></script>
</body>
</html>
