<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Nova Publicação</title>
    <link rel="stylesheet" href="/02-07/frontend/styles/telaDeCadastro.css">
</head>
<body>
    <div class="post-container">
        <header class="post-header">
            <h2>Criar Nova Publicação</h2>
            <p>Escreva e compartilhe suas ideias com o mundo.</p>
        </header>
        
        <form>
            <!-- Campo de Título -->
            <div class="input-group">
                <label for="post-title">Título do Post</label>
                <input type="text" id="post-title" placeholder="Dê um título atraente para o seu post..." required maxlength="100">
                <span class="character-counter">Máximo 100 caracteres</span>
            </div>
            
            <!-- Campo de Categoria -->
            <div class="input-group">
                <label for="post-category">Categoria</label>
                <select id="post-category" required>
                    <option value="" disabled selected>Selecione uma categoria...</option>
                    <option value="tecnologia">Tecnologia</option>
                    <option value="educacao">Educação</option>
                    <option value="estilo-vida">Estilo de Vida</option>
                    <option value="entretenimento">Entretenimento</option>
                    <option value="outros">Outros</option>
                </select>
            </div>
            
            <!-- Campo do Conteúdo -->
            <div class="input-group">
                <label for="post-content">Conteúdo do Post</label>
                <textarea id="post-content" rows="8" placeholder="Escreva o corpo do seu texto aqui..." required></textarea>
            </div>
            
            <!-- Botões de Ação -->
            <div class="form-actions">
                <button type="button" class="btn-secondary">Descartar Rascunho</button>
                <button type="submit" class="btn-primary">Publicar Post</button>
            </div>
        </form>
    </div>
</body>
</html>
