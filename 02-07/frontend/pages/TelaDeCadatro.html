<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro Simples</title>
    <link rel="stylesheet" href="/02-07/frontend/styles/TelaDeCadastro.css">
</head>
<body>

    <div class="cadastro-container">
        <h2>Criar Conta</h2>
        <p class="subtitulo">Preencha os campos abaixo para começar.</p>

        <form action="#" method="POST">
            <div class="campo-grupo">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required>
            </div>

            <div class="campo-grupo">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" placeholder="seuemail@exemplo.com" required>
            </div>

            <div class="campo-grupo">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" placeholder="Crie uma senha forte" required>
            </div>

            <button type="submit" class="btn-cadastrar">Cadastrar</button>
        </form>

        <div class="rodape-form">
            Já tem uma conta? <a href="#">Faça login</a>
        </div>
    </div>

</body>
</html>
